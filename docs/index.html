<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Modern Love — Column Index</title>
<meta name="description" content="A searchable index of every New York Times Modern Love column, 2004–2026.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#efe8da; --card:#f7f2e8; --ink:#241d16; --muted:#7c7263;
    --accent:#7c3b34; --line:rgba(36,29,22,.13); --hover:rgba(124,59,52,.06);
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --ls:"League Spartan","Helvetica Neue",Arial,sans-serif;
  }
  @media (prefers-color-scheme:dark){:root{
    --paper:#16120e; --card:#201a15; --ink:#ece3d2; --muted:#9a8f7c;
    --accent:#d1806f; --line:rgba(236,227,210,.14); --hover:rgba(209,128,111,.10);
  }}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--serif);
    -webkit-font-smoothing:antialiased;line-height:1.5}
  .wrap{max-width:1000px;margin:0 auto;padding:clamp(28px,5vw,56px) clamp(16px,4vw,40px)}
  header{margin-bottom:26px}
  .kicker{font-family:var(--ls);font-weight:700;font-size:12px;letter-spacing:.28em;
    text-transform:uppercase;color:var(--accent);margin:0 0 12px}
  h1{font-family:var(--ls);font-weight:900;font-size:clamp(34px,7vw,58px);line-height:.9;
    letter-spacing:-.01em;margin:0}
  .sub{margin:14px 0 0;color:var(--muted);font-size:16px}
  .controls{display:flex;gap:14px;align-items:baseline;flex-wrap:wrap;margin:26px 0 14px}
  #q{flex:1;min-width:220px;font:400 16px/1.4 var(--serif);color:var(--ink);
    background:var(--card);border:1px solid var(--line);border-radius:7px;padding:11px 14px}
  #q:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:transparent}
  #count{font-family:var(--ls);font-size:13px;letter-spacing:.04em;color:var(--muted);
    font-variant-numeric:tabular-nums;white-space:nowrap}
  .scroll{overflow:auto;max-height:74vh;border:1px solid var(--line);border-radius:10px;background:var(--card)}
  table{border-collapse:collapse;width:100%;font-size:15px}
  thead th{position:sticky;top:0;background:var(--card);text-align:left;
    font-family:var(--ls);font-weight:700;font-size:11.5px;letter-spacing:.11em;
    text-transform:uppercase;color:var(--muted);padding:13px 14px;border-bottom:1px solid var(--line);
    cursor:pointer;user-select:none;white-space:nowrap}
  thead th:hover{color:var(--accent)}
  th .arw{opacity:.35;font-size:10px;margin-left:5px}
  th[aria-sort="ascending"] .arw,th[aria-sort="descending"] .arw{opacity:1;color:var(--accent)}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:baseline}
  tbody tr:last-child td{border-bottom:0}
  tbody tr:hover{background:var(--hover)}
  .n,.date{font-family:var(--ls);font-weight:400;font-variant-numeric:tabular-nums;
    color:var(--muted);white-space:nowrap}
  .n{width:1%}
  td.title a{color:inherit;text-decoration:none;border-bottom:1px solid var(--line)}
  td.title a:hover{border-color:var(--accent);color:var(--accent)}
  .author{white-space:nowrap;color:var(--ink)}
  .author.pending{color:var(--muted);font-style:italic}
  footer{margin-top:30px;color:var(--muted);font-size:13.5px;line-height:1.6}
  footer a{color:var(--accent)}
  mark{background:color-mix(in srgb,var(--accent) 26%,transparent);color:inherit;border-radius:2px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="kicker">The New York Times</p>
    <h1>Modern Love</h1>
    <p class="sub">An index of every column &middot; <span id="span">2004&ndash;2026</span></p>
  </header>

  <div class="controls">
    <input id="q" type="search" placeholder="Search title, author, or year…" autocomplete="off" spellcheck="false">
    <span id="count"></span>
  </div>

  <div class="scroll">
    <table aria-label="Modern Love columns">
      <thead><tr>
        <th data-key="n" aria-sort="ascending">#<span class="arw">▲</span></th>
        <th data-key="date">Date<span class="arw">▲</span></th>
        <th data-key="title">Title<span class="arw">▲</span></th>
        <th data-key="author">Author<span class="arw">▲</span></th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

  <footer id="foot"></footer>
</div>

<script>
const DATA = window.__INDEX__ || fetch("index.json").then(r => r.json());
let rows = [], sortKey = "n", sortDir = 1, q = "";

const esc = s => (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const hi = (s, term) => {
  s = esc(s);
  if (!term) return s;
  try { return s.replace(new RegExp("("+term.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig"), "<mark>$1</mark>"); }
  catch { return s; }
};

function render(){
  const term = q.trim().toLowerCase();
  let view = rows;
  if (term) view = rows.filter(r =>
    (r.title+" "+r.author+" "+r.date+" #"+r.n).toLowerCase().includes(term));
  view = view.slice().sort((a,b)=>{
    let x=a[sortKey], y=b[sortKey];
    if (sortKey==="n"){ x=+x; y=+y; }
    return (x>y?1:x<y?-1:0)*sortDir;
  });
  document.getElementById("rows").innerHTML = view.map(r => `
    <tr>
      <td class="n">${r.n}</td>
      <td class="date">${r.date}</td>
      <td class="title"><a href="${esc(r.url)}" target="_blank" rel="noopener">${hi(r.title, q.trim())}</a></td>
      <td class="author${r.author?"":" pending"}">${r.author ? hi(r.author, q.trim()) : "—"}</td>
    </tr>`).join("");
  document.getElementById("count").textContent =
    `${view.length.toLocaleString()} of ${rows.length.toLocaleString()} columns`;
}

function setSort(key){
  if (sortKey===key) sortDir*=-1; else { sortKey=key; sortDir=1; }
  document.querySelectorAll("th").forEach(th=>{
    const on = th.dataset.key===sortKey;
    th.setAttribute("aria-sort", on ? (sortDir>0?"ascending":"descending") : "none");
    const a = th.querySelector(".arw"); if (a) a.textContent = on ? (sortDir>0?"▲":"▼") : "▲";
  });
  render();
}

document.querySelectorAll("th").forEach(th => th.addEventListener("click", ()=>setSort(th.dataset.key)));
document.getElementById("q").addEventListener("input", e=>{ q=e.target.value; render(); });

Promise.resolve(DATA).then(d => {
  rows = d;
  if (rows.length){
    document.getElementById("span").textContent = `${rows[0].date.slice(0,4)}–${rows[rows.length-1].date.slice(0,4)}`;
    const known = rows.filter(r=>r.author).length;
    document.getElementById("foot").innerHTML =
      `Titles link to nytimes.com (a subscription is required to read). ` +
      `${known.toLocaleString()} of ${rows.length.toLocaleString()} bylines recorded. ` +
      `Generated from <a href="https://github.com" target="_blank" rel="noopener">the Modern&nbsp;Love&nbsp;→&nbsp;EPUB project</a>; ` +
      `bibliographic data only. Column &copy; The New York Times and its authors.`;
  }
  render();
});
</script>
</body>
</html>
