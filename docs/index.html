<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Modern Love — Column Index</title>
<meta name="description" content="A searchable index of every New York Times Modern Love column, 2004–2026.">
<style>
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;padding:2rem 1rem;background:#fff;color:#000;
    font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  main{margin:0}
  a{color:inherit}
  h1{margin:0;font-size:1.5rem;text-transform:uppercase;letter-spacing:.02em}
  .meta{margin:.5rem 0 1.25rem}
  #q{display:block;width:100%;max-width:32rem;font:inherit;color:inherit;background:#fff;
    border:2px solid #000;border-radius:0;padding:.55rem .7rem;margin-bottom:1.25rem}
  #q:focus{outline:2px solid #000;outline-offset:2px}
  table{border-collapse:collapse;width:100%;border:2px solid #000}
  th,td{border:1px solid #000;padding:.4rem .6rem;text-align:left;
    vertical-align:top;white-space:nowrap}
  th{position:sticky;top:0;background:#fff;color:#fff;cursor:pointer;
    user-select:none;text-transform:uppercase;font-size:.8rem}
  th[aria-sort="ascending"]::after{content:" +";color:#000}
  th[aria-sort="descending"]::after{content:" -";color:#000}
  tbody tr:hover{background:#f2f2f2}
  mark{background:#000;color:#fff}
  .pending{color:#888}
  footer{margin-top:1.25rem;font-size:.8rem;line-height:1.6}

  /* Mobile: collapse each row into a stacked block (title, then date · author). */
  @media (max-width:768px){
    table{display:block;border:0}
    thead{display:none}
    tbody{display:block}
    tbody tr{display:flex;flex-wrap:wrap;align-items:baseline;
      border-bottom:1px solid #000;padding:.7rem 0}
    tbody tr:hover{background:transparent}
    td{border:0;padding:0;white-space:normal}
    td.n{display:none}
    td.title{order:-1;flex:0 0 100%;font-size:1rem;line-height:1.35;margin-bottom:.3rem}
    td.date,td:last-child{color:#555;font-size:.85rem}
    td:last-child::before{content:" · "}
  }
</style>
</head>
<body>
<main>
  <h1>Modern Love</h1>
  <p class="meta">Every New York Times &ldquo;Modern Love&rdquo; column &middot; <span id="span">2004&ndash;2026</span> &middot; <span id="count"></span></p>

  <input id="q" type="search" placeholder="search title, author, or year" autocomplete="off" spellcheck="false">

  <table aria-label="Modern Love columns">
    <thead><tr>
      <th data-key="n" aria-sort="ascending">#</th>
      <th data-key="date">Date</th>
      <th data-key="title">Title</th>
      <th data-key="author">Author</th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>

  <footer id="foot"></footer>
</main>

<script>
const DATA = window.__INDEX__ || fetch("index.json").then(r => r.json());
let rows = [], sortKey = "n", sortDir = 1, q = "";

const esc = s => (s||"").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const hi = (s, term) => {
  s = esc(s);
  if (!term) return s;
  try { return s.replace(new RegExp("("+term.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig"), "<mark>$1</mark>"); }
  catch { return s; }
};

function render(){
  const term = q.trim().toLowerCase();
  let view = rows;
  if (term) view = rows.filter(r =>
    (r.title+" "+r.author+" "+r.date+" #"+r.n).toLowerCase().includes(term));
  view = view.slice().sort((a,b)=>{
    let x=a[sortKey], y=b[sortKey];
    if (sortKey==="n"){ x=+x; y=+y; }
    return (x>y?1:x<y?-1:0)*sortDir;
  });
  document.getElementById("rows").innerHTML = view.map(r => `
    <tr>
      <td class="n">${r.n}</td>
      <td class="date">${r.date}</td>
      <td class="title"><a href="${esc(r.url)}" target="_blank" rel="noopener">${hi(r.title, q.trim())}</a></td>
      <td class="${r.author?"":"pending"}">${r.author ? hi(r.author, q.trim()) : "—"}</td>
    </tr>`).join("");
  document.getElementById("count").textContent =
    term ? `${view.length.toLocaleString()} of ${rows.length.toLocaleString()}`
         : `${rows.length.toLocaleString()} columns`;
}

function setSort(key){
  if (sortKey===key) sortDir*=-1; else { sortKey=key; sortDir=1; }
  document.querySelectorAll("th").forEach(th=>{
    if (th.dataset.key===sortKey) th.setAttribute("aria-sort", sortDir>0?"ascending":"descending");
    else th.removeAttribute("aria-sort");
  });
  render();
}

document.querySelectorAll("th").forEach(th => th.addEventListener("click", ()=>setSort(th.dataset.key)));
document.getElementById("q").addEventListener("input", e=>{ q=e.target.value; render(); });

Promise.resolve(DATA).then(d => {
  rows = d;
  if (rows.length){
    document.getElementById("span").textContent =
      `${rows[0].date.slice(0,4)}–${rows[rows.length-1].date.slice(0,4)}`;
    const known = rows.filter(r=>r.author).length;
    document.getElementById("foot").innerHTML =
      `Titles link to nytimes.com; a subscription is required to read. ` +
      `${known.toLocaleString()} of ${rows.length.toLocaleString()} bylines recorded. ` +
      `Bibliographic data only &mdash; columns &copy; The New York Times and its authors.`;
  }
  render();
});
</script>
</body>
</html>
